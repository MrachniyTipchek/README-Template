name: Bug report
description: Report a reproducible problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What did you expect to happen, and what happened instead?
      placeholder: A clear, concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots, screen recording, or logs
      description: Optional but strongly encouraged. Paste error output, stack traces, or relevant log lines. Add links to images or recordings, or describe what you would show in a screenshot.
      placeholder: Paste logs or traces here. Add URLs or short descriptions for visuals if needed.
      value: |
        Logs / console / stack trace:
        

        Links or notes for screenshots or recordings:
        
    validations:
      required: false
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: List the steps so others can reproduce the issue.
      placeholder: |
        Starting point (screen, URL, command, or state):
        Actions you take in order:
        What you observe when the bug appears:
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps us understand the issue (edge cases, how often it happens, related workarounds).
      placeholder: Optional.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: System information
      description: Operating system, project or dependency versions, browser and version if relevant, and any other environment details.
      placeholder: |
        OS:
        Version (app, package, or commit):
        Browser (if applicable):
        Other:
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      description: Please confirm the following before submitting.
      options:
        - label: I am using the latest released version of this project (or the latest version I can reasonably obtain).
          required: true
        - label: I have installed all required dependencies for my setup, if any.
          required: true
        - label: I searched existing issues and did not find an open or closed duplicate of this report.
          required: true

name: Question or other
description: Topics outside bug/feature templates (legal, copyright, conduct, other). Add your full message below.
title: "[Other]: "
labels:
  - question
body:
  - type: textarea
    id: message
    attributes:
      label: Your message
      description: Describe your question or situation in full. If this is sensitive, share only what you are comfortable posting publicly. You can paste links to images or recordings and include contact details if needed.
      placeholder: Provide the details maintainers need to understand and respond.
    validations:
      required: true
